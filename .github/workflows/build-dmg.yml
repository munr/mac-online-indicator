name: Build DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project "Online Indicator.xcodeproj" \
            -scheme "Online Indicator" \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/OnlineIndicator.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Extract App from Archive
        run: |
          mkdir -p "${{ github.workspace }}/build/export"
          cp -r "${{ github.workspace }}/build/OnlineIndicator.xcarchive/Products/Applications/Online Indicator.app" \
                "${{ github.workspace }}/build/export/Online Indicator.app"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Online Indicator" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Online Indicator.app" 160 180 \
            --hide-extension "Online Indicator.app" \
            --app-drop-link 420 180 \
            "OnlineIndicator-${{ github.ref_name }}.dmg" \
            "${{ github.workspace }}/build/export/"

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "OnlineIndicator-${{ github.ref_name }}.dmg"
